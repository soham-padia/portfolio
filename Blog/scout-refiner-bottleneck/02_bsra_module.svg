<svg width="100%" viewBox="0 0 680 1180" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Bottleneck scout-refiner attention</title>
<desc>The scout-refiner attention module: full-width scout attention projects down to bottleneck dimension, a skip from the input adds in (optionally gated), then refiner attention runs in bottleneck space before projecting back up to full width.</desc>
<defs>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
.c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text, .c-purple .th, .c-purple .ts { fill: #3C3489; }
.c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text, .c-teal .th, .c-teal .ts { fill: #085041; }
.c-amber rect, .c-amber circle { fill: #FAEEDA; stroke: #BA7517; }
.c-amber text, .c-amber .th, .c-amber .ts { fill: #854F0B; }
.c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #D85A30; }
.c-coral text, .c-coral .th, .c-coral .ts { fill: #993C1D; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="240" y="30" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Input z</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">(B, T, 768) after LN₁</text>
</g>

<circle cx="340" cy="90" r="3" fill="#5F5E5A"/>
<line x1="340" y1="74" x2="340" y2="90" class="arr"/>
<line x1="340" y1="90" x2="560" y2="90" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="560" y1="90" x2="560" y2="500" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="340" y1="90" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="115" width="600" height="280" rx="10" fill="none" stroke="#7F77DD" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="60" y="135" text-anchor="start">Scout stage — full width D = 768</text>

<g class="c-purple">
<rect x="240" y="145" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="163" text-anchor="middle" dominant-baseline="central">QKV projection</text>
<text class="ts" x="340" y="179" text-anchor="middle" dominant-baseline="central">Linear(D, 3D)</text>
</g>
<line x1="340" y1="189" x2="340" y2="215" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="200" y="215" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="235" text-anchor="middle" dominant-baseline="central">Causal self-attention</text>
<text class="ts" x="340" y="255" text-anchor="middle" dominant-baseline="central">12 heads × 64, full mask M</text>
</g>
<line x1="340" y1="271" x2="340" y2="300" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="200" y="300" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="320" text-anchor="middle" dominant-baseline="central">Project down to bottleneck</text>
<text class="ts" x="340" y="340" text-anchor="middle" dominant-baseline="central">Linear(D, D_s), 768 → 384</text>
</g>

<line x1="340" y1="356" x2="340" y2="430" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="385" text-anchor="start">scout: (B, T, 384)</text>

<rect x="40" y="415" width="600" height="170" rx="10" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="60" y="435" text-anchor="start">Skip into bottleneck space</text>

<g class="c-teal">
<rect x="200" y="445" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="465" text-anchor="middle" dominant-baseline="central">Skip projection</text>
<text class="ts" x="340" y="485" text-anchor="middle" dominant-baseline="central">Linear(D, D_s, bias=False)</text>
</g>
<line x1="560" y1="473" x2="482" y2="473" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="575" y="450" text-anchor="start">z</text>

<g class="c-amber">
<rect x="200" y="510" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="530" text-anchor="middle" dominant-baseline="central">Optional gate (GS only)</text>
<text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">sigmoid(Linear(D, D_s)) ⊙ skip</text>
</g>
<line x1="340" y1="501" x2="340" y2="510" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<line x1="340" y1="566" x2="340" y2="600" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="615" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="615" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<text class="ts" x="380" y="618" text-anchor="start">add scout + skip</text>

<line x1="340" y1="633" x2="340" y2="660" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="655" width="600" height="380" rx="10" fill="none" stroke="#D85A30" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" x="60" y="675" text-anchor="start">Refiner stage — bottleneck D_s = 384</text>

<g class="c-coral">
<rect x="240" y="690" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="708" text-anchor="middle" dominant-baseline="central">LayerNorm</text>
<text class="ts" x="340" y="724" text-anchor="middle" dominant-baseline="central">Normalize across D_s</text>
</g>
<line x1="340" y1="734" x2="340" y2="760" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="240" y="760" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="778" text-anchor="middle" dominant-baseline="central">QKV projection</text>
<text class="ts" x="340" y="794" text-anchor="middle" dominant-baseline="central">Linear(D_s, 3·D_s)</text>
</g>
<line x1="340" y1="804" x2="340" y2="830" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="200" y="830" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="850" text-anchor="middle" dominant-baseline="central">Causal self-attention</text>
<text class="ts" x="340" y="870" text-anchor="middle" dominant-baseline="central">12 heads × 32, mask varies (§3.4)</text>
</g>
<line x1="340" y1="886" x2="340" y2="915" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="200" y="915" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="935" text-anchor="middle" dominant-baseline="central">Project up to full width</text>
<text class="ts" x="340" y="955" text-anchor="middle" dominant-baseline="central">Linear(D_s, D), 384 → 768</text>
</g>
<line x1="340" y1="971" x2="340" y2="1000" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="240" y="1000" width="200" height="30" rx="8" stroke-width="0.5"/>
<text class="ts" x="340" y="1015" text-anchor="middle" dominant-baseline="central">Residual dropout</text>
</g>

<line x1="340" y1="1030" x2="340" y2="1060" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="1060" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="1078" text-anchor="middle" dominant-baseline="central">Output</text>
<text class="ts" x="340" y="1094" text-anchor="middle" dominant-baseline="central">(B, T, 768)</text>
</g>

</svg>
