<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Single-MLP scout-refiner block</title>
<desc>The SMLP block: scout-refiner attention with standard skip, first residual add, then a single wide MLP with 8× expansion replaces the dual parallel branches used in SR.</desc>
<defs>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
.c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
.c-blue text, .c-blue .th, .c-blue .ts { fill: #0C447C; }
.c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text, .c-purple .th, .c-purple .ts { fill: #3C3489; }
.c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #D85A30; }
.c-coral text, .c-coral .th, .c-coral .ts { fill: #993C1D; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="240" y="30" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Input x</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">(B, T, 768)</text>
</g>

<line x1="340" y1="74" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<circle cx="340" cy="110" r="3" fill="#5F5E5A"/>
<line x1="340" y1="110" x2="100" y2="110" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="100" y1="110" x2="100" y2="350" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<g class="c-blue">
<rect x="240" y="120" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">LayerNorm 1</text>
<text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">Normalize across D</text>
</g>

<line x1="340" y1="164" x2="340" y2="190" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="180" y="190" width="320" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="212" text-anchor="middle" dominant-baseline="central">Scout-refiner attention</text>
<text class="ts" x="340" y="232" text-anchor="middle" dominant-baseline="central">Scout at D, standard skip, refine at D_s</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">Outputs (B, T, 768)</text>
</g>

<line x1="340" y1="266" x2="340" y2="335" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="350" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="100" y1="350" x2="318" y2="350" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="80" y="220" text-anchor="middle">residual</text>

<line x1="340" y1="368" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="400" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="418" text-anchor="middle" dominant-baseline="central">h</text>
<text class="ts" x="340" y="434" text-anchor="middle" dominant-baseline="central">After attention sub-layer</text>
</g>

<line x1="340" y1="444" x2="340" y2="470" class="arr"/>

<circle cx="340" cy="470" r="3" fill="#5F5E5A"/>
<line x1="340" y1="470" x2="100" y2="470" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="100" y1="470" x2="100" y2="640" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<line x1="340" y1="470" x2="340" y2="500" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="240" y="500" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="518" text-anchor="middle" dominant-baseline="central">LayerNorm 2</text>
<text class="ts" x="340" y="534" text-anchor="middle" dominant-baseline="central">Single norm</text>
</g>

<line x1="340" y1="544" x2="340" y2="570" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="140" y="570" width="400" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="592" text-anchor="middle" dominant-baseline="central">MLP — 8× expansion</text>
<text class="ts" x="340" y="612" text-anchor="middle" dominant-baseline="central">Linear → GELU → Linear</text>
<text class="ts" x="340" y="630" text-anchor="middle" dominant-baseline="central">D → 8D → D  (768 → 6144 → 768)</text>
</g>

<line x1="340" y1="646" x2="340" y2="678" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="690" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="690" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="100" y1="640" x2="100" y2="690" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="100" y1="690" x2="318" y2="690" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="80" y="580" text-anchor="middle">residual</text>

<line x1="340" y1="708" x2="340" y2="730" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="730" width="200" height="28" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="744" text-anchor="middle" dominant-baseline="central">Output x'</text>
</g>

</svg>
