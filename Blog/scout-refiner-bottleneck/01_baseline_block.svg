<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Baseline transformer block</title>
<desc>A standard pre-LN transformer block showing input flowing through LayerNorm, causal self-attention, a residual add, then LayerNorm, MLP, and a second residual add.</desc>
<defs>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
.c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
.c-blue text, .c-blue .th, .c-blue .ts { fill: #0C447C; }
.c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text, .c-purple .th, .c-purple .ts { fill: #3C3489; }
.c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text, .c-teal .th, .c-teal .ts { fill: #085041; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="240" y="40" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="58" text-anchor="middle" dominant-baseline="central">Input x</text>
<text class="ts" x="340" y="74" text-anchor="middle" dominant-baseline="central">Shape (B, T, D)</text>
</g>

<line x1="340" y1="84" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

<circle cx="340" cy="120" r="3" fill="#5F5E5A"/>
<line x1="340" y1="120" x2="120" y2="120" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="120" y1="120" x2="120" y2="290" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<g class="c-blue">
<rect x="240" y="130" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="148" text-anchor="middle" dominant-baseline="central">LayerNorm 1</text>
<text class="ts" x="340" y="164" text-anchor="middle" dominant-baseline="central">Normalize across D</text>
</g>

<line x1="340" y1="174" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="200" y="200" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="220" text-anchor="middle" dominant-baseline="central">Causal self-attention</text>
<text class="ts" x="340" y="240" text-anchor="middle" dominant-baseline="central">12 heads, masked softmax(QK / √d) V</text>
</g>

<line x1="340" y1="256" x2="340" y2="285" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="300" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="300" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="120" y1="290" x2="318" y2="300" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="208" text-anchor="middle">residual</text>

<line x1="340" y1="318" x2="340" y2="350" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="350" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="368" text-anchor="middle" dominant-baseline="central">h</text>
<text class="ts" x="340" y="384" text-anchor="middle" dominant-baseline="central">After attention sub-layer</text>
</g>

<line x1="340" y1="394" x2="340" y2="420" class="arr" marker-end="url(#arrow)"/>

<circle cx="340" cy="430" r="3" fill="#5F5E5A"/>
<line x1="340" y1="430" x2="120" y2="430" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="120" y1="430" x2="120" y2="600" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<g class="c-blue">
<rect x="240" y="440" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="458" text-anchor="middle" dominant-baseline="central">LayerNorm 2</text>
<text class="ts" x="340" y="474" text-anchor="middle" dominant-baseline="central">Normalize across D</text>
</g>

<line x1="340" y1="484" x2="340" y2="510" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="200" y="510" width="280" height="56" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="530" text-anchor="middle" dominant-baseline="central">MLP (4× expansion)</text>
<text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">Linear → GELU → Linear, D → 4D → D</text>
</g>

<line x1="340" y1="566" x2="340" y2="595" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="610" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="610" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="120" y1="600" x2="318" y2="610" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="518" text-anchor="middle">residual</text>

<line x1="340" y1="628" x2="340" y2="660" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="660" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="678" text-anchor="middle" dominant-baseline="central">Output x'</text>
<text class="ts" x="340" y="694" text-anchor="middle" dominant-baseline="central">Passed to next block</text>
</g>

<rect x="40" y="105" width="120" height="220" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="335" text-anchor="middle">Attention sub-layer</text>

<rect x="40" y="415" width="120" height="220" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
<text class="ts" x="100" y="645" text-anchor="middle">MLP sub-layer</text>

</svg>
