<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Span-bottleneck refiner mask</title>
<desc>Two attention masks side by side. The left shows the full causal triangle used by SR's refiner. The right shows SB's windowed band, where each position attends only to itself and the previous 127 positions. The scout in both variants uses the full causal mask.</desc>
<defs>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
.c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
.c-amber text, .c-amber .th, .c-amber .ts { fill: #854F0B; }
.c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text, .c-teal .th, .c-teal .ts { fill: #085041; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="160" y="40" text-anchor="middle">SR refiner — full causal</text>
<text class="th" x="520" y="40" text-anchor="middle">SB refiner — window W = 128</text>

<g transform="translate(60, 60)">
<rect x="0" y="0" width="200" height="200" fill="none" stroke="#888780" stroke-width="0.5"/>
<polygon points="0,0 200,200 0,200" fill="#7F77DD" fill-opacity="0.35" stroke="#534AB7" stroke-width="0.5"/>
<line x1="0" y1="0" x2="200" y2="200" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="100" y="225" text-anchor="middle">key position j →</text>
<text class="ts" x="-15" y="100" text-anchor="middle" transform="rotate(-90, -15, 100)">query position i →</text>
<text class="ts" x="50" y="160" text-anchor="middle" fill="#26215C">attends to all j ≤ i</text>
</g>

<g transform="translate(420, 60)">
<rect x="0" y="0" width="200" height="200" fill="none" stroke="#888780" stroke-width="0.5"/>
<polygon points="0,0 25,25 200,200 175,200 0,25" fill="#D85A30" fill-opacity="0.4" stroke="#993C1D" stroke-width="0.5"/>
<polygon points="0,0 200,200 0,200" fill="none" stroke="#888780" stroke-width="0.4" stroke-dasharray="2 2"/>
<line x1="0" y1="0" x2="200" y2="200" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="2 2"/>
<text class="ts" x="100" y="225" text-anchor="middle">key position j →</text>
<text class="ts" x="-15" y="100" text-anchor="middle" transform="rotate(-90, -15, 100)">query position i →</text>
<text class="ts" x="135" y="155" text-anchor="middle" fill="#4A1B0C">band of width W</text>
</g>

<g class="c-gray">
<rect x="40" y="320" width="600" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="338" text-anchor="middle" dominant-baseline="central">Scout uses full causal mask in both variants</text>
<text class="ts" x="340" y="354" text-anchor="middle" dominant-baseline="central">Only the refiner mask differs between SR and SB</text>
</g>

<g class="c-amber">
<rect x="40" y="380" width="290" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="185" y="402" text-anchor="middle" dominant-baseline="central">Attention cost</text>
<text class="ts" x="185" y="422" text-anchor="middle" dominant-baseline="central">SR refiner O(T²) → SB refiner O(T · W)</text>
</g>

<g class="c-teal">
<rect x="350" y="380" width="290" height="60" rx="8" stroke-width="0.5"/>
<text class="th" x="495" y="402" text-anchor="middle" dominant-baseline="central">Parameter count</text>
<text class="ts" x="495" y="422" text-anchor="middle" dominant-baseline="central">Identical to SR — mask is a buffer</text>
</g>

</svg>
