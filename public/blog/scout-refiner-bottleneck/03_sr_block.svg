<svg width="100%" viewBox="0 0 680 880" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Scout-refiner block with dual parallel MLP</title>
<desc>The SR block: input flows through LayerNorm and bottleneck scout-refiner attention with a residual add, then splits into two parallel MLP branches with independent weights whose outputs are averaged and added back as a second residual.</desc>
<defs>
<style>
.t { font: 14px sans-serif; fill: #2C2C2A; }
.ts { font: 12px sans-serif; fill: #5F5E5A; }
.th { font: 500 14px sans-serif; fill: #2C2C2A; }
.arr { stroke: #5F5E5A; stroke-width: 1.5; fill: none; }
.c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
.c-blue rect, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
.c-blue text, .c-blue .th, .c-blue .ts { fill: #0C447C; }
.c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-purple text, .c-purple .th, .c-purple .ts { fill: #3C3489; }
.c-teal rect, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal text, .c-teal .th, .c-teal .ts { fill: #085041; }
.c-coral rect, .c-coral circle { fill: #FAECE7; stroke: #D85A30; }
.c-coral text, .c-coral .th, .c-coral .ts { fill: #993C1D; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g class="c-gray">
<rect x="240" y="30" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">Input x</text>
<text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">(B, T, 768)</text>
</g>

<line x1="340" y1="74" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<circle cx="340" cy="110" r="3" fill="#5F5E5A"/>
<line x1="340" y1="110" x2="80" y2="110" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="80" y1="110" x2="80" y2="350" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<g class="c-blue">
<rect x="240" y="120" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">LayerNorm 1</text>
<text class="ts" x="340" y="154" text-anchor="middle" dominant-baseline="central">Normalize across D</text>
</g>

<line x1="340" y1="164" x2="340" y2="190" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="180" y="190" width="320" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="212" text-anchor="middle" dominant-baseline="central">Scout-refiner attention</text>
<text class="ts" x="340" y="232" text-anchor="middle" dominant-baseline="central">Scout at D, skip, refine at D_s</text>
<text class="ts" x="340" y="250" text-anchor="middle" dominant-baseline="central">Outputs (B, T, 768)</text>
</g>

<line x1="340" y1="266" x2="340" y2="335" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="350" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="350" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="80" y1="350" x2="318" y2="350" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="220" text-anchor="middle">residual</text>

<line x1="340" y1="368" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="400" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="418" text-anchor="middle" dominant-baseline="central">h</text>
<text class="ts" x="340" y="434" text-anchor="middle" dominant-baseline="central">After attention sub-layer</text>
</g>

<line x1="340" y1="444" x2="340" y2="470" class="arr"/>

<circle cx="340" cy="470" r="3" fill="#5F5E5A"/>
<line x1="340" y1="470" x2="80" y2="470" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="80" y1="470" x2="80" y2="770" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<line x1="340" y1="470" x2="180" y2="470" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="180" y1="470" x2="180" y2="500" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="470" x2="500" y2="470" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="500" y1="470" x2="500" y2="500" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="100" y="500" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="518" text-anchor="middle" dominant-baseline="central">LayerNorm 2a</text>
<text class="ts" x="180" y="534" text-anchor="middle" dominant-baseline="central">Branch A norm</text>
</g>

<g class="c-coral">
<rect x="420" y="500" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="518" text-anchor="middle" dominant-baseline="central">LayerNorm 2b</text>
<text class="ts" x="500" y="534" text-anchor="middle" dominant-baseline="central">Branch B norm</text>
</g>

<line x1="180" y1="544" x2="180" y2="570" class="arr" marker-end="url(#arrow)"/>
<line x1="500" y1="544" x2="500" y2="570" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="80" y="570" width="200" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="180" y="592" text-anchor="middle" dominant-baseline="central">MLP_a</text>
<text class="ts" x="180" y="612" text-anchor="middle" dominant-baseline="central">Linear → GELU → Linear</text>
<text class="ts" x="180" y="630" text-anchor="middle" dominant-baseline="central">D → 4D → D</text>
</g>

<g class="c-coral">
<rect x="400" y="570" width="200" height="76" rx="8" stroke-width="0.5"/>
<text class="th" x="500" y="592" text-anchor="middle" dominant-baseline="central">MLP_b</text>
<text class="ts" x="500" y="612" text-anchor="middle" dominant-baseline="central">Linear → GELU → Linear</text>
<text class="ts" x="500" y="630" text-anchor="middle" dominant-baseline="central">independent weights</text>
</g>

<line x1="180" y1="646" x2="180" y2="700" class="arr"/>
<line x1="500" y1="646" x2="500" y2="700" class="arr"/>
<line x1="180" y1="700" x2="320" y2="700" stroke="#5F5E5A" stroke-width="1" fill="none"/>
<line x1="500" y1="700" x2="360" y2="700" stroke="#5F5E5A" stroke-width="1" fill="none"/>

<g class="c-gray">
<rect x="280" y="700" width="120" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="720" text-anchor="middle" dominant-baseline="central">0.5 · (a + b)</text>
</g>

<line x1="340" y1="740" x2="340" y2="770" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<circle cx="340" cy="785" r="18" stroke-width="0.5"/>
<text class="th" x="340" y="785" text-anchor="middle" dominant-baseline="central">+</text>
</g>
<line x1="80" y1="770" x2="318" y2="785" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="580" text-anchor="middle">residual</text>

<line x1="340" y1="803" x2="340" y2="830" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="240" y="830" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="850" text-anchor="middle" dominant-baseline="central">Output x'</text>
</g>

</svg>
