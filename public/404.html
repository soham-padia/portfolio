<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Soham Padia</title>
  <script>
    // GitHub Pages SPA redirect for project repos (e.g. user.github.io/repo/).
    // Keeps the first path segment (/portfolio) then encodes the rest as a
    // query string so index.html can restore it via history.replaceState.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
